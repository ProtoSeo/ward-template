name: Tag Aggregation

on:
  push:
    branches: [main]

jobs:
  aggregate:
    runs-on: ubuntu-latest
    # 이 워크플로우 자신의 커밋이면 스킵 (무한 루프 방지)
    if: "!contains(github.event.head_commit.message, '[skip tag-agg]')"
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyYAML

      - name: Aggregate bookmarks by tag
        run: |
          python3 << 'PYEOF'
          import os
          import yaml
          from collections import defaultdict

          EXCLUDED_DIRS = {'.git', '.github', '_layouts', '_site'}
          bookmarks_by_tag = defaultdict(list)
          untagged = []
          total = 0

          for entry in sorted(os.listdir('.')):
              if entry in EXCLUDED_DIRS or entry.startswith('_') or entry.startswith('.'):
                  continue
              if not os.path.isdir(entry):
                  continue
              readme_path = os.path.join(entry, 'README.md')
              if not os.path.isfile(readme_path):
                  continue

              with open(readme_path, 'r', encoding='utf-8') as f:
                  content = f.read()

              if not content.startswith('---'):
                  continue
              end = content.find('---', 3)
              if end < 0:
                  continue

              try:
                  fm = yaml.safe_load(content[3:end])
              except yaml.YAMLError:
                  continue
              if not isinstance(fm, dict):
                  continue

              title = fm.get('title') or entry
              source_url = fm.get('source_url', '')
              tag_value = fm.get('tag', '')

              item = {
                  'title': title,
                  'folder': entry,
                  'source_url': source_url
              }
              total += 1

              tag_list = [t.strip() for t in str(tag_value).split(',') if t.strip()]
              if not tag_list:
                  untagged.append(item)
              else:
                  for tag in tag_list:
                      bookmarks_by_tag[tag.lower()].append(item)

          # README 생성
          lines = [
              '# Ward Bookmarks',
              '',
              f'{total} bookmark(s) saved.',
              '',
              '<!-- Generated by tag-aggregation workflow. Do not edit manually. -->',
              '',
              '## Tags',
              ''
          ]

          if bookmarks_by_tag:
              for tag in sorted(bookmarks_by_tag.keys()):
                  lines.append(f'### #{tag}')
                  lines.append('')
                  for b in sorted(bookmarks_by_tag[tag], key=lambda x: x['title']):
                      line = f'- [{b["title"]}](./{b["folder"]}/)'
                      if b['source_url']:
                          line += f' — [source]({b["source_url"]})'
                      lines.append(line)
                  lines.append('')

          if untagged:
              lines.append('## Untagged')
              lines.append('')
              for b in sorted(untagged, key=lambda x: x['title']):
                  line = f'- [{b["title"]}](./{b["folder"]}/)'
                  if b['source_url']:
                      line += f' — [source]({b["source_url"]})'
                  lines.append(line)
              lines.append('')

          with open('README.md', 'w', encoding='utf-8') as f:
              f.write('\n'.join(lines))
          PYEOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: aggregate bookmarks by tag [skip tag-agg]"
            git push
          fi
